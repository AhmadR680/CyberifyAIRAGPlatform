services:
  - type: web
    name: cyberify-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cyberify-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: cyberify-redis
          property: connectionString
      - key: POSTGRES_DB
        value: cyberify
      # Add user provided keys via Render Dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: cyberify-celery
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cyberify-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: cyberify-redis
          property: connectionString

  - type: redis
    name: cyberify-redis
    region: ohio
    plan: free
    ipAllowList: []

databases:
  - name: cyberify-db
    databaseName: cyberify
    user: cyberify_user
    plan: free
    region: ohio
