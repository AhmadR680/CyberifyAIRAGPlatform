# version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cyberify_postgres
    restart: always
    environment:
      POSTGRES_DB: cyberify
      POSTGRES_USER: cyberify
      POSTGRES_PASSWORD: cyberify123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cyberify_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: cyberify_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  celery:
    build: ./backend
    container_name: cyberify_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    container_name: cyberify_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx next dev --webpack

volumes:
  postgres_data:
